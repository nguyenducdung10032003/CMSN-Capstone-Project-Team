name: Backend Build

on:
  push:
    branches: ["main", "dev", "feat/**", "refactor/**", "style/**", "fix/**"]
    paths:
      - be/apps/**
      - .github/workflows/be.yml
  pull_request:
    branches: ["dev"]
    paths:
      - be/apps/**
      - .github/workflows/be.yml

permissions:
  contents: read
  packages: write

jobs:
  detect-services:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{steps.set-matrix.outputs.matrix}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Services List
        id: set-matrix
        run: |
          services=$(ls -d be/services/*/ | xargs -n 1 basename | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$services" >> $GITHUB_OUTPUT

  nx-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./be/package-lock.json

      - name: Check disk
        run: df -h

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: ./be/apps

      - run: npm install
        working-directory: ./be

      - run: npm ci
        working-directory: ./be

      - name: Force clean Gradle builds
        run: |
          rm -rf be/apps/*/build || true

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: npx nx-cloud record -- echo Hello World
      #      - run: npx nx run-many -t lint build typecheck --exclude=services
      #        working-directory: ./be
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      # - run: npx nx fix-ci
      #   working-directory: ./be
      #   if: always()

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: be/apps/.gradle/caches
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}"
          restore-keys: "${{ runner.os }}-gradle"

      - name: Build and Package Images
        working-directory: be
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # 1. Build Application Services (Java & Node.js)
          services=(
            auth
            construction
            customer
            device
            eureka
            gateway
            image
            notification
            organization
          )

          for service in "${services[@]}"
          do
            ./apps/gradlew -p apps :$service:bootBuildImage \
              --imageName=ghcr.io/$REPO_LOWER/$service:latest
          done

          # Build Node.js email-service
          docker build --target runner -t ghcr.io/$REPO_LOWER/email:latest -f apps/Dockerfile .

          # 2. Package Infrastructure using Docker Compose and .env
          # We use "docker compose config" to resolve image names and tags from your files
          cd apps
          
          # Create .env file:
          # Priority 1: From GitHub Secrets (ENV_FILE)
          # Priority 2: Fallback to .env.example
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          elif [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Fill default values for ports if they are empty (to prevent "no port specified" error in CI)
          sed -i 's/POSTGRES_PORT=$/POSTGRES_PORT=5432/g' .env
          sed -i 's/MONGO_PORT=$/MONGO_PORT=27017/g' .env
          sed -i 's/RABBITMQ_PROTOCOL=$/RABBITMQ_PROTOCOL=5672/g' .env
          sed -i 's/RABBITMQ_WEB_PORT=$/RABBITMQ_WEB_PORT=15672/g' .env

          # Pull images defined in your compose files
          docker compose -f docker-compose-db.yml -f docker-compose-other.yml --env-file .env pull

          # Tag and prepare for push
          docker tag postgres:15-alpine ghcr.io/$REPO_LOWER/postgres:latest
          docker tag mongo:6.0 ghcr.io/$REPO_LOWER/mongodb:latest
          docker tag rabbitmq:4-management ghcr.io/$REPO_LOWER/rabbitmq:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Push image to GitHub Container Registry
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          services=(
            auth
            construction
            customer
            device
            email
            eureka
            gateway
            image
            notification
            organization
            postgres
            mongodb
            rabbitmq
          )

          for service in "${services[@]}"
          do
            docker push ghcr.io/$REPO_LOWER/$service:latest
          done
