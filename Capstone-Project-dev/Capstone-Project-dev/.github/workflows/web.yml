name: Web Build

on:
  push:
    branches: ["main", "dev", "feat/**", "refactor/**", "style/**", "fix/**"]
    paths:
      - fe/webapp/**
      - .github/workflows/web.yml
  pull_request:
    branches: ["dev"]
    paths:
      - fe/webapp/**
      - .github/workflows/web.yml

permissions:
  contents: read
  packages: write

jobs:
  next-build-and-deploy:
    name: Next.js Build & Deploy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: fe/webapp/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: fe/webapp

      - name: Run typescheck
        run: npm run typescheck
        working-directory: fe/webapp

      - name: Build
        run: npm run build
        working-directory: fe/webapp
      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: fe/webapp/dist
