name: AI Service Build

on:
    push:
        branches:
            ["main", "dev", "feat/**", "refactor/**", "style/**", "fix/**"]
        paths:
            - "be/apps/ai-service/**"
            - .github/workflows/ai.yml
    pull_request:
        branches:
            - "dev"
        paths:
            - "be/apps/ai-service/**"
            - .github/workflows/ai.yml

permissions:
    contents: read
    packages: write

jobs:
    setup:
        runs-on: ubuntu-latest
        outputs:
            versions: ${{ steps.get-versions.outputs.versions }}
            latest_version: ${{ steps.get-versions.outputs.latest_version }}
        steps:
            - uses: actions/checkout@v4
            - id: get-versions
              run: |
                  # Find directories matching v* and get their basenames
                  VERSION_LIST=$(ls -d be/apps/ai-service/v*/ | xargs -n 1 basename | sort -V)
                  VERSIONS_JSON=$(echo "$VERSION_LIST" | jq -R . | jq -s -c .)
                  LATEST=$(echo "$VERSION_LIST" | tail -n 1)
                  
                  echo "versions=$VERSIONS_JSON" >> $GITHUB_OUTPUT
                  echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
                  echo "Detected versions: $VERSIONS_JSON"
                  echo "Latest version: $LATEST"

    python-check:
        needs: setup
        runs-on: ubuntu-latest
        strategy:
            matrix:
                version: ${{ fromJson(needs.setup.outputs.versions) }}
            fail-fast: false
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip"
                  cache-dependency-path: "be/apps/ai-service/${{ matrix.version }}/requirements.txt"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install flake8 pytest
                  if [ -f be/apps/ai-service/${{ matrix.version }}/requirements.txt ]; then
                    pip install -r be/apps/ai-service/${{ matrix.version }}/requirements.txt
                  fi
              working-directory: be/apps/ai-service/${{ matrix.version }}

            - name: Lint with flake8
              run: |
                  # stop the build if there are Python syntax errors or undefined names
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                  # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
              working-directory: be/apps/ai-service/${{ matrix.version }}

            - name: Test with pytest
              run: |
                  if [ -d tests ]; then
                    pytest
                  else
                    echo "No tests directory found, skipping pytest."
                  fi
              working-directory: be/apps/ai-service/${{ matrix.version }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Image
              working-directory: be
              run: |
                  REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  VERSION="${{ matrix.version }}"
                  LATEST_VERSION="${{ needs.setup.outputs.latest_version }}"
                  
                  IMAGE_BASE="ghcr.io/$REPO_LOWER/ai-service"
                  VERSION_TAG="$IMAGE_BASE:$VERSION"
                  
                  echo "Building image: $VERSION_TAG"
                  docker build -t "$VERSION_TAG" -f apps/ai-service/$VERSION/Dockerfile apps/ai-service/$VERSION

                  echo "Pushing image: $VERSION_TAG"
                  docker push "$VERSION_TAG"

                  if [ "$VERSION" == "$LATEST_VERSION" ]; then
                    LATEST_TAG="$IMAGE_BASE:latest"
                    echo "Tagging as latest: $LATEST_TAG"
                    docker tag "$VERSION_TAG" "$LATEST_TAG"
                    docker push "$LATEST_TAG"
                  fi
