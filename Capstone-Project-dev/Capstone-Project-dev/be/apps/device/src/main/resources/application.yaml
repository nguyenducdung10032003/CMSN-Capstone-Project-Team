spring:
  application:
    name: device
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT_INTERNAL:6379}
      timeout: 2000
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka
  instance:
    prefer-ip-address: true
server:
  port: 9006
  servlet:
    context-path: /api/v1
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
rabbit-mq-config:
  exchange: exchange
  queue: construction_queue
  entities:
    - material-price
    - meter-type
    - materials-group
    - calculation-unit
    - params
    - water-price
  actions:
    - update
    - delete
ai-service:
  url: http://127.0.0.1:8001
