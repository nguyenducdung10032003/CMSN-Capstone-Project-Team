openapi: 3.0.3
info:
  title: API YOLO Paddle OCR
  version: 1.0.0
  description: |
    Dịch vụ AI hỗ trợ nhận diện chỉ số đồng hồ nước.

    Dịch vụ nhận hình ảnh đồng hồ, sử dụng YOLOv5 để phát hiện các vùng liên quan,
    sau đó áp dụng PaddleOCR trên các vùng đó và trả về kết quả OCR định dạng JSON.

    Tài liệu kỹ thuật này dành cho việc tích hợp hệ thống backend và ứng dụng di động.

servers:
  - url: http://127.0.0.1:8010
    description: Máy chủ phát triển môi trường local
  - url: http://127.0.0.1:8001
    description: Máy chủ local mặc định

tags:
  #  - name: service
  #    description: Endpoints for service discovery and health checking.
  - name: prediction
    description: Các endpoint để tải lên hình ảnh và nhận kết quả OCR.

paths:
  #  /:
  #    get:
  #      operationId: getServiceInfo
  #      tags:
  #        - service
  #      summary: Service information
  #      description: Returns basic information about the AI service and available routes.
  #      responses:
  #        "200":
  #          description: Service information returned successfully.
  #          content:
  #            application/json:
  #              schema:
  #                $ref: "#/components/schemas/RootResponse"
  #              example:
  #                service: YOLO Paddle OCR API
  #                version: 1.0.0
  #                status: running
  #                docs_url: /docs
  #                health_url: /health
  #                predict_url: /predict
  #
  #  /health:
  #    get:
  #      operationId: getHealthStatus
  #      tags:
  #        - service
  #      summary: Health check
  #      description: Returns the health status of the AI service.
  #      responses:
  #        "200":
  #          description: Service is alive.
  #          content:
  #            application/json:
  #              schema:
  #                $ref: "#/components/schemas/HealthResponse"
  #              example:
  #                status: ok

  /predict:
    post:
      operationId: predictMeterImage
      tags:
        - prediction
      summary: Dự đoán chỉ số đồng hồ từ hình ảnh tải lên
      description: |
        Nhận một tệp hình ảnh dưới dạng multipart/form-data, thực hiện nhận diện bằng YOLOv5
        và PaddleOCR, sau đó trả về các vùng được phát hiện kèm kết quả OCR.

        Quy tắc tích hợp:
        - Yêu cầu phải chứa một trường định dạng multipart tên là `file`
        - Phía Client nên đọc dữ liệu trong `results` dựa theo `label`, không nên dựa vào thứ tự mảng
        - `Current_pointer_reading_region.text` là giá trị chỉ số đồng hồ chính
        - `Serial_number_region.text` là giá trị số series của đồng hồ
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PredictRequest"
            encoding:
              file:
                contentType: image/jpeg, image/png
      responses:
        "200":
          description: Dự đoán hoàn tất thành công.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictResponse"
              example:
                filename: test.jpg
                results:
                  - box: [179, 328, 808, 948]
                    label: meter
                    text: ""
                    conf: 0.9744331240653992
                    raw_texts: []
                  - box: [306, 379, 672, 481]
                    label: Serial_number_region
                    text: "217858315"
                    yolo_conf: 0.8412966132164001
                    ocr_conf: 0.996
                    heuristic: 0.75
                    final_conf: 0.902
                    raw_texts:
                      - ["217858315", 0.9964125156402588]
                  - box: [272, 492, 684, 565]
                    label: Current_pointer_reading_region
                    text: "0008879"
                    yolo_conf: 0.6725512146949768
                    ocr_conf: 0.96
                    heuristic: 0.75
                    final_conf: 0.81
                    raw_texts:
                      - ["0008879", 0.9597879648208618]
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    RootResponse:
      type: object
      required:
        - service
        - version
        - status
        - docs_url
        - health_url
        - predict_url
      properties:
        service:
          type: string
          description: Tên dịch vụ.
          example: YOLO Paddle OCR API
        version:
          type: string
          description: Phiên bản dịch vụ.
          example: 1.0.0
        status:
          type: string
          description: Trạng thái thực thi hiện tại của dịch vụ.
          example: running
        docs_url:
          type: string
          description: URL tương đối dẫn đến giao diện Swagger UI.
          example: /docs
        health_url:
          type: string
          description: URL tương đối dẫn đến endpoint kiểm tra sức khỏe.
          example: /health
        predict_url:
          type: string
          description: URL tương đối dẫn đến endpoint dự đoán.
          example: /predict

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Giá trị trạng thái sức khỏe.
          example: ok

    PredictRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: Tệp hình ảnh đồng hồ cần được xử lý.

    PredictResponse:
      type: object
      required:
        - filename
        - results
      properties:
        filename:
          type: string
          description: Tên tệp gốc được tải lên.
          example: test.jpg
        results:
          type: array
          description: |
            Danh sách các vùng được phát hiện. Phía tiêu thụ API phải xác định các giá trị
            nghiệp vụ theo trường `label` thay vì dựa vào thứ tự trong mảng.
          items:
            $ref: "#/components/schemas/PredictionItem"

    PredictionItem:
      type: object
      required:
        - box
        - label
        - text
        - raw_texts
      properties:
        box:
          type: array
          description: Tọa độ khung giới hạn (bounding box) trên ảnh gốc theo định dạng [x1, y1, x2, y2].
          minItems: 4
          maxItems: 4
          items:
            type: integer
          example: [272, 492, 684, 565]
        label:
          type: string
          description: Loại vùng được phát hiện.
          enum:
            - meter
            - Serial_number_region
            - Current_pointer_reading_region
        text:
          type: string
          description: Văn bản OCR cuối cùng sau khi đã xử lý hậu kỳ.
          example: "0008879"
        conf:
          type: number
          format: float
          nullable: true
          description: |
            Trường độ tin cậy đơn giản, chủ yếu được sử dụng cho các phát hiện không dùng kết hợp độ tin cậy OCR,
            thường là vùng `meter`.
          example: 0.9744331240653992
        yolo_conf:
          type: number
          format: float
          nullable: true
          description: Độ tin cậy của quá trình phát hiện YOLO.
          example: 0.6725512146949768
        ocr_conf:
          type: number
          format: float
          nullable: true
          description: Độ tin cậy OCR cao nhất được trả về từ PaddleOCR.
          example: 0.96
        heuristic:
          type: number
          format: float
          nullable: true
          description: Điểm số logic (heuristic) nội bộ được dùng trong quá trình kết hợp độ tin cậy.
          example: 0.75
        final_conf:
          type: number
          format: float
          nullable: true
          description: Độ tin cậy cuối cùng sau khi kết hợp các điểm YOLO, OCR và heuristic.
          example: 0.81
        raw_texts:
          type: array
          description: Kết quả OCR thô trước khi xử lý hậu kỳ.
          items:
            $ref: "#/components/schemas/RawTextCandidate"
          example:
            - ["0008879", 0.9597879648208618]

    RawTextCandidate:
      type: array
      minItems: 2
      maxItems: 2
      description: |
        Phần tử OCR thô trước khi xử lý hậu kỳ, định dạng là `[văn bản, độ tin cậy]`.
      items:
        oneOf:
          - type: string
          - type: number
            format: float
      example: ["0008879", 0.9597879648208618]

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Thông báo lỗi dễ hiểu cho người dùng.
          example: Thiếu tệp tải lên

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string

    HTTPValidationError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

  responses:
    BadRequest:
      description: Yêu cầu không hợp lệ, tệp trống hoặc hình ảnh không thể giải mã.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing_file:
              summary: Thiếu tệp
              value:
                detail: Thiếu tệp tải lên
            empty_file:
              summary: Tệp trống
              value:
                detail: Tệp tải lên bị trống
            decode_error:
              summary: Không thể giải mã ảnh
              value:
                detail: Không thể giải mã hình ảnh đã tải lên

    ValidationError:
      description: Yêu cầu không khớp với cấu trúc multipart/form-data dự kiến.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HTTPValidationError"

    InternalServerError:
      description: Lỗi nội bộ trong quá trình tải mô hình hoặc thực hiện suy luận OCR.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: Lỗi Máy Chủ Nội Bộ (Internal Server Error)
