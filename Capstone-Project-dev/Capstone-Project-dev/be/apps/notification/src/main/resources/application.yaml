spring:
  application:
    name: notification
  profiles:
    active: dev
  rabbitmq:
    listener:
      simple:
        missing-queues-fatal: false
        auto-startup: true
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 999999
          max-interval: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 5 # nang core khi co nhieu truy van song song
      minimum-idle: 3 # So ket noi idle luon co san
      connection-timeout: 2000 # Cho ket noi toi da 3s
      max-lifetime: 600000 # Ket noi song toi da 30p
      idle-timeout: 30000 # Dong idle sau 30s neu khong su dung
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
      base-path: /actuator
server:
  port: 9007
  servlet:
    context-path: /api/v1
web-frontend-url: ${WEB_FRONTEND_URL:http://localhost:3000}
cors:
  allowed-origins:
    - ${web-frontend-url}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:9000/eureka
  instance:
    prefer-ip-address: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
rabbit-mq-config:
  update: update
  delete: delete
  exchange: exchange
  queue: construction_queue
  entities:
    - lateral
    - commune
    - neighborhood-unit
    - road
    - hamlet
    - material-price
    - meter-type
    - materials-group
    - calculation-unit
    - params
    - water-price
    - department
    - employee
    - installation-form
    - cost-estimate
    - receipt
    - finance
    - construction-request
    - page
    - roadmap
  actions:
    - update
    - delete
    - create
    - approve
    - assign
    - require-significance
    - view
  auth-routingKey: auth.individual-notification.create
  auth-queue: auth.individual-notification.queue
